<div class="produtos-container">

  <div class="produto-card">
    <div class="card-content">
      <div class="info">
        <div class="row">
          <span class="label">Nome:</span>
          <span class="value">Produto Exemplo</span>
        </div>
        <div class="row">
          <span class="label">Estoque:</span>
          <span class="value">120</span>
        </div>
        <div class="row">
          <span class="label">Preço de Venda:</span>
          <span class="value">R$ 150,00</span>
        </div>
        <div class="row">
          <span class="label">Preço de Compra:</span>
          <span class="value">R$ 90,00</span>
        </div>

        <div class="categories">
          <span class="label">Categorias:</span>
          <div class="category-list">
            <div class="category-item">
              <span class="cat-name">Eletrônicos</span>
              <span class="cat-desc">Produtos eletrônicos</span>
            </div>
            <div class="category-item">
              <span class="cat-name">Tecnologia</span>
              <span class="cat-desc">Produtos de tecnologia</span>
            </div>
            <!-- Adicionar mais categorias dinamicamente -->
          </div>
        </div>

      <div class="actions">
        <button class="btn edit">Editar</button>
        <button class="btn delete">Excluir</button>
      </div>
    </div>
  </div>

</div>
