<div class="produtos-container">
  <div class="header">
    <button class="btn add-product" routerLink="/produto-form">Novo Produto</button>
  </div>

  <div class="produto-table">
    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Estoque</th>
          <th>Preço de Compra</th>
          <th>Preço de Venda</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let produto of produtos">
          <!-- 👇 data-label faz o nome da coluna aparecer no mobile -->
          <td data-label="Nome">{{ produto.nome }}</td>
          <td data-label="Estoque" class="center">{{ produto.estoque }}</td>
          <td data-label="Preço de Compra"class="center">R$ {{ produto.precoCompra | number:'1.2-2' }}</td>
          <td data-label="Preço de Venda" class="center">R$ {{ produto.precoVenda | number:'1.2-2' }}</td>
          <td data-label="Ações" class="actions">
            <button class="btn details" [routerLink]="['/produtos', produto.id]">Detalhes</button>
            <button class="btn edit">Editar</button>
            <button class="btn delete">Excluir</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
