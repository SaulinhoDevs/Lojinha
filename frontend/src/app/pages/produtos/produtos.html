<div class="produtos-container">
  <!-- Botão para adicionar novo produto, centralizado -->
  <div class="header">
    <button class="btn add-product">Novo Produto</button>
  </div>

  <!-- Tabela de produtos -->
  <div class="produto-table">
    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Estoque</th>
          <th>Preço de Compra</th>
          <th>Preço de Venda</th>
          <th></th> <!-- Removido o título "Ações" -->
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Produto A</td>
          <td>50</td>
          <td>R$ 100,00</td>
          <td>R$ 150,00</td>
          <td class="actions">
            <button class="btn details">Detalhes</button>
            <button class="btn edit">Editar</button>
            <button class="btn delete">Excluir</button>
          </td>
        </tr>
        <tr>
          <td>Produto B</td>
          <td>30</td>
          <td>R$ 80,00</td>
          <td>R$ 120,00</td>
          <td class="actions">
            <button class="btn details">Detalhes</button>
            <button class="btn edit">Editar</button>
            <button class="btn delete">Excluir</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
