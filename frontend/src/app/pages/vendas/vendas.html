<div class="vendas-container">
  <!-- Botão para adicionar nova venda -->
  <div class="header">
    <button class="btn add-venda">Nova Venda</button>
  </div>

  <!-- Tabela de vendas -->
  <div class="vendas-table">
    <table>
      <thead>
        <tr>
          <th>Data da Venda</th>
          <th>Frete</th>
          <th>Desconto</th>
          <th>Total</th>
          <th>Status</th>
          <th></th> <!-- Coluna para botões de Ações -->
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let venda of vendas">
          <td>{{ venda.dataVenda | date:'dd/MM/yyyy' }}</td>
          <td>R$ {{ venda.frete | number:'1.2-2' }}</td>
          <td>R$ {{ venda.desconto | number:'1.2-2' }}</td>
          <td>R$ {{ venda.total | number:'1.2-2' }}</td>
          <td>{{ venda.status }}</td>
          <td class="actions">
            <button class="btn details">Detalhes</button>
            <button class="btn edit">Editar</button>
            <button class="btn delete">Excluir</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
