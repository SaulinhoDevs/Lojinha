<form [formGroup]="formulario" (ngSubmit)="salvar()" class="form-container">

  <div class="form-group">
    <label>Nome Completo *</label>
    <input type="text" formControlName="nome" placeholder="Digite seu nome completo">
  </div>

  <div class="form-group checkbox-group">
    <label class="checkbox-label">
      <input type="checkbox" formControlName="temDivida">
      Já tem uma dívida?
    </label>
    <input type="number" formControlName="divida" placeholder="R$ 0,00">
  </div>

  <div class="form-group">
    <label>Telefone</label>
    <input type="text" formControlName="telefone" mask="(00) 00000-0000" placeholder="(xx) xxxxx-xxxx">
  </div>

  <div class="form-group">
    <label>Rua *</label>
    <input type="text" formControlName="rua">
  </div>

  <div class="form-group">
    <label>Bairro *</label>
    <input type="text" formControlName="bairro">
  </div>

  <div class="form-group">
    <label>Número *</label>
    <input type="number" formControlName="numero">
  </div>

  <div class="form-actions">
    <button type="submit" class="btn-submit" [disabled]="formulario.invalid">Salvar Novo Cliente</button>
  </div>

</form>
