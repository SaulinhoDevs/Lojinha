<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | Lojinha</title>

    <!-- Links para CSS, Ícones e Fontes -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          xintegrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
            href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Poppins:wght@400;500&display=swap"
            rel="stylesheet">

    <!-- CSS Customizado com caminhos corrigidos para Thymeleaf -->
    <link rel="stylesheet" th:href="@{/css/cadastro.css}">
</head>

<body class="py-5">

<main class="container">
    <div class="row justify-content-center">
        <div class="col-11 col-md-10 col-lg-9 col-xl-8">
            <div class="card cadastro-card">
                <div class="row g-0">
                    <div class="col-md-6">
                        <div class="card-body p-4 p-sm-5">
                            <header class="text-center">
                                <h1 class="cadastro-card-header">Cadastro</h1>
                                <!-- Subheader dinâmico -->
                                <div class="subheader-container">
                                    <ul class="subheader-flip">
                                        <li>
                                            <div>Pronto para novos <span>Produtos</span>?</div>
                                        </li>
                                        <li>
                                            <div>Pronto para novas <span>Descobertas</span>?</div>
                                        </li>
                                        <li>
                                            <div>Comece sua <span>Jornada</span>!</div>
                                        </li>
                                    </ul>
                                </div>
                            </header>

                            <form>
                                @if (erro) {
                                  <div class="alert alert-danger" role="alert">{{ erro }}</div>
                                }
                                @if (sucesso) {
                                  <div class="alert alert-success" role="alert">{{ sucesso }}</div>
                                }
                              
                                <div class="mb-3">
                                  <label for="nome" class="form-label">Nome</label>
                                  <input type="text" class="form-control" id="nome"
                                         name="nome"                          
                                         placeholder="Seu nome completo"
                                         [(ngModel)]="nome"
                                         required />
                                </div>
                              
                                <div class="mb-3">
                                  <label for="email" class="form-label">Email</label>
                                  <input type="email" class="form-control" id="email"
                                         name="email"                          
                                         placeholder="seuemail@exemplo.com"
                                         [(ngModel)]="email"
                                         required />
                                </div>
                              
                                <div class="mb-3">
                                  <label for="senha" class="form-label">Senha</label>
                                  <input type="password" class="form-control" id="senha"
                                         name="senha"                          
                                         placeholder="Crie uma senha forte"
                                         [(ngModel)]="senha"
                                         required />
                                </div>
                              
                                <div class="mb-4">
                                  <label for="tipo" class="form-label">Tipo</label>
                                  <select id="tipo" class="form-select"
                                          name="tipo"                          
                                          [(ngModel)]="tipo"
                                          (ngModelChange)="onTipoChange()"
                                          required>
                                    <option value="" disabled>Selecione o tipo</option>
                                    <option value="CPF">CPF</option>
                                    <option value="CNPJ">CNPJ</option>
                                  </select>
                                </div>
                              
                                @if (tipo === 'CPF' || tipo === 'CNPJ') {
                                  <div class="mb-4">
                                    <label for="documento" class="form-label">
                                      {{ tipo === 'CPF' ? 'CPF' : 'CNPJ' }}
                                    </label>
                                    <input
                                      type="text"
                                      class="form-control"
                                      id="documento"
                                      name="documento"                        
                                      [placeholder]="tipo === 'CPF' ? '000.000.000-00' : '00.000.000/0000-00'"
                                      [(ngModel)]="documento"
                                      (input)="aplicarMascara($event)"
                                      [maxlength]="tipo === 'CPF' ? 14 : 18"
                                      required
                                    />
                                  </div>
                                }

                                <div class="d-grid">
                                    <button type="submit" class="btn btn-primary btn-cadastro">
                                        <i class="bi bi-person-plus-fill"></i> Cadastrar
                                    </button>
                                </div>
                            </form>
                            <footer class="text-center mt-4">
                                <p class="text-muted mb-0">Já tem uma conta?</p>
                                <!-- Adicionada classe para transição JS -->
                                <a (click)="navegarCom('/login')" class="signup-link page-transition-link">Entre aqui!</a>
                            </footer>
                        </div>
                    </div>

                    <!-- Seção da imagem agora com a animação -->
                    <div class="col-md-6 d-none d-md-block cadastro-image-section">
                        <div class="lojinha-animation-container">
                            <div class="question-mark"></div>
                            <div class="question-dot"></div>
                            <div class="sparkle sparkle1"></div>
                            <div class="sparkle sparkle2"></div>
                            <div class="sparkle sparkle3"></div>
                            <div class="sparkle sparkle4"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        xintegrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

</body>

</html>
