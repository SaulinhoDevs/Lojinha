<div class="clientes-container">
  <!-- Botão para adicionar novo cliente, centralizado -->
  <div class="header">
    <button class="btn add-client">Novo Cliente</button>
  </div>

  <!-- Tabela de clientes -->
  <div class="clientes-table">
    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Telefone</th>
          <th>Dívida</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let cliente of clientes">
          <td>{{cliente.nome}}</td>
          <td>{{cliente.telefone}}</td>
          <td class="dívida">R$ {{cliente.divida | number:'1.2-2' }}</td>
          <td class="actions">
            <button class="btn details">Detalhes</button>
            <button class="btn edit">Editar</button>
            <button class="btn delete">Excluir</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
