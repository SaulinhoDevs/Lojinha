<div class="clientes-container">
  <!-- Botão para adicionar novo cliente, centralizado -->
  <div class="header">
    <button class="btn add-client" routerLink="/cliente-form">Novo Cliente</button>
  </div>

  <!-- Tabela de clientes -->
  <div class="clientes-table">
    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Telefone</th>
          <th>Dívida</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let cliente of clientes">
          <td data-label="Nome" class="nome">{{cliente.nome}}</td>
          <td data-label="Telefone" class="telefone">{{cliente.telefone}}</td>
          <td data-label="Dívida" class="dívida">R$ {{cliente.divida | number:'1.2-2' }}</td>
          <td class="actions">
            <button class="btn details" [routerLink]="['/clientes', cliente.id]">Detalhes</button>
            <button class="btn edit" [routerLink]="['/clientes', cliente.id, 'editar']">Editar</button>
            <button class="btn delete" (click)="excluir(cliente.id, cliente.nome)">Excluir</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
