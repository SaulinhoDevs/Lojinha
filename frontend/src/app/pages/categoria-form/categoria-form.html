<form [formGroup]="formulario" (ngSubmit)="salvar()" class="form-container">

  <div class="form-group">
    <label>Nome da Categoria *</label>
    <input type="text" formControlName="nome" placeholder="Ex: Eletrônicos, Roupas, Alimentos..."
      [class.input-error]="isCampoInvalido('nome')">

    @if (isCampoInvalido('nome')) {
    <span class="error-message">O nome da categoria é obrigatório.</span>
    }
  </div>

  <div class="form-group" style="margin-top: 15px;">
    <label>Descrição</label>
    <textarea formControlName="descricao" rows="4"
      placeholder="Digite detalhes opcionais sobre esta categoria..."></textarea>
  </div>

  <div class="form-actions">
    <button type="submit" class="btn-submit" [disabled]="formulario.invalid">Salvar Categoria</button>
  </div>

</form>
