<div class="details-container">
  <div class="details-card">

    <div *ngIf="carregando" class="status-box loading">
      <p>Carregando dados do cliente...</p>
    </div>

    <div *ngIf="!carregando && erro" class="status-box error">
      <h2>Ops!</h2>
      <p>{{ erro }}</p>

      <a routerLink="/categorias" class="btn-voltar">
        Voltar para a listagem
      </a>
    </div>

    <div *ngIf="!carregando && categoria" class="categoria-content">
      <div class="header">
        <h1>Detalhes da Categoria</h1>
        <a routerLink="/categorias" class="btn-voltar">Voltar</a>
      </div>

      <div class="info-grid">
        <div class="info-item">
          <span class="label">Nome</span>
          <span class="value">{{ categoria.nome }}</span>
        </div>

        <div class="info-item full-width">
          <span class="label">Descrição</span>
          <span class="value">{{ categoria.descricao }}</span>
        </div>
      </div>
    </div>

  </div>
</div>
